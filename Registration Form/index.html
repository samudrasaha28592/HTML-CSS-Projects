<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form action="">
        <h2>Registration Form</h2>

        <div>

            <label for="fullname">Full Name</label>
            <input type="text" name="fullname" id="fullname">

        </div> <br>
        <div>
            <label for="email">Email</label>
            <input type="email" name="email" id="email">
        </div> <br>

        <div>
            <label for="password">Password</label>
            <input type="password" name="password" id="password">

        </div> <br>


        <div>

            <label for="dob">Date of Birth</label>
            <input type="date" name="dob" id="dob">

        </div> <br>

        <div>

            <label for="photo">Upload Photo</label>
            <input type="file" name="file" id="file">


        </div> <br>

        <div>
            <label for="gender">Gender</label>
            <input type="radio" name="gender" id="male">Male
            <input type="radio" name="gender" id="female">Female

        </div> <br>

        <div>
            <label for="religion">Religion</label>
            <input type="checkbox" name="c1" value="Hindu">Hindu
            <input type="checkbox" name="c2" value="Muslim">Muslim
            <input type="checkbox" name="c3" value="Chiristian">Chiristian


        </div> <br>
        <div>
            <label for="department">Department</label>
            <select name="dept" id="dept">

                <option value="cse">CSE</option>

                <option value="eee">EEE</option>
                <option value="Mecha">ME</option>
                <option value="math">MATH</option>
                <option value="SWE">SWE</option>
            </select>


        </div> <br>
        <div>

            <label for="message">Message</label> <br>
            <textarea name="msg" id="msg" cols="45" rows="6">text here....</textarea>
        </div>
        <div>
            <input type="Submit">
            <input type="reset">
        </div>



    </form>


</body>

</html>
