<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Circular Skills</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>My Skills</h2>

        <div class="grid">

            <div class="circle" data-percent="90">
                <svg>
                    <circle class="bg" cx="60" cy="60" r="50"></circle>
                    <circle class="progress html" cx="60" cy="60" r="50"></circle>
                </svg>
                <span>HTML</span>
            </div>

            <div class="circle" data-percent="85">
                <svg>
                    <circle class="bg" cx="60" cy="60" r="50"></circle>
                    <circle class="progress css" cx="60" cy="60" r="50"></circle>
                </svg>
                <span>CSS</span>
            </div>

            <div class="circle" data-percent="75">
                <svg>
                    <circle class="bg" cx="60" cy="60" r="50"></circle>
                    <circle class="progress js" cx="60" cy="60" r="50"></circle>
                </svg>
                <span>JavaScript</span>
            </div>

            <div class="circle" data-percent="70">
                <svg>
                    <circle class="bg" cx="60" cy="60" r="50"></circle>
                    <circle class="progress python" cx="60" cy="60" r="50"></circle>
                </svg>
                <span>Python</span>
            </div>

            <div class="circle" data-percent="80">
                <svg>
                    <circle class="bg" cx="60" cy="60" r="50"></circle>
                    <circle class="progress react" cx="60" cy="60" r="50"></circle>
                </svg>
                <span>React</span>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
