<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Skill Progress</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>My Skills Progress</h2>

        <div class="skill">
            <p>HTML <span>90%</span></p>
            <div class="bar">
                <div class="fill html"></div>
            </div>
        </div>

        <div class="skill">
            <p>CSS <span>85%</span></p>
            <div class="bar">
                <div class="fill css"></div>
            </div>
        </div>

        <div class="skill">
            <p>JavaScript <span>75%</span></p>
            <div class="bar">
                <div class="fill js"></div>
            </div>
        </div>

        <div class="skill">
            <p>Python <span>70%</span></p>
            <div class="bar">
                <div class="fill python"></div>
            </div>
        </div>

        <div class="skill">
            <p>React <span>80%</span></p>
            <div class="bar">
                <div class="fill react"></div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
